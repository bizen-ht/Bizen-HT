[build]
  functions = "Netlify/Functions"

[functions]
  node_bundler = "esbuild"

# firebase-admin est lourd / a des imports dynamiques : on le laisse "externe"
# (Netlify l'installe depuis package.json au lieu de le bundler avec esbuild).
[functions.webhook]
  external_node_modules = ["firebase-admin"]

[functions.notify]
  external_node_modules = ["firebase-admin"]

[functions.admin-create-user]
  external_node_modules = ["firebase-admin"]

[functions.dm-send]
  external_node_modules = ["firebase-admin"]

[[redirects]]
  from = "/admin.html"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/admin"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/Vye"
  to = "/Vye.html"
  status = 200

# ===== URLs propres (sans .html) =====
[[redirects]]
  from = "/dashboard"
  to = "/Dashboard.html"
  status = 200

# Lien dédié pour le formulaire Elu (ouvre le popup Inskri sur le formulaire Elu)
