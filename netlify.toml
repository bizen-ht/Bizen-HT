[build]
  functions = "Netlify/Functions"

[functions]
  node_bundler = "esbuild"

# firebase-admin est lourd / a des imports dynamiques : on le laisse "externe"
# (Netlify l'installe depuis package.json au lieu de le bundler avec esbuild).
[functions.webhook]
  external_node_modules = ["firebase-admin"]

[functions.notify]
  external_node_modules = ["firebase-admin"]

[[redirects]]
  from = "/admin.html"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/admin"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/Vye"
  to = "/Vye.html"
  status = 200

[[redirects]]
  from = "/success.html"
  to = "/?payment=success"
  status = 302

[[redirects]]
  from = "/error.html"
  to = "/?payment=error"
  status = 302